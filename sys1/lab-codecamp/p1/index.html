<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="freeCodeCamp Survey Form">
    
    <title>Project-1: Survey Form</title>
  </head>
  <body>
    <header>
      <h1 id="title">freeCodeCamp Survey Form</h1>
      <a href="../../../index.html"><button>Back to Workspace</button></a>
      <hr>
      <p id="description">Thank you for taking the time to help us improve the platform</p>
    </header>
    <main>
      <form id="survey-form">
        <fieldset>
          <legend>Personal Information</legend>
          <label for="name" id="name-label">Name</label>
          <input required placeholder="Enter Your Name" id="name" type="text" name="user-name">
          <br>
          <label for="email" id="email-label">Email</label>
          <input required placeholder="Enter Your Email" id="email" type="email" name="user-email">
          <br>
          <label for="number" id="number-label">Age &#40;Optional&#41;</label>
          <input id="number" type="number" placeholder="Age" min="3" max="130" name="user-age">
        </fieldset>
        <br>
        <fieldset>
          <legend><label for="dropdown">Which option best describes your current role?</label></legend>
          <select id="dropdown" name="user-role">
            <option value="">Select current role</option>
            <option value="student">Student</option>
            <option value="full-time-job">Full Time Job</option>
            <option value="full-time-learner">Full Time Learner</option>
            <option value="prefer-not-to-say">Prefer not to say</option>
            <option value="other">Other</option>
          </select>
        </fieldset>
        <br>
        <fieldset>
          <legend>Would you recommend freeCodeCamp to a friend?</legend>

          <input type="radio" name="recommendation" id="recommendation-1" value="definitely"> 
          <label for="recommendation-1">Definitely</label>
          <br>
          <input type="radio" name="recommendation" id="recommendation-2" value="maybe"> 
          <label for="recommendation-2">Maybe</label>
          <br>
          <input type="radio" name="recommendation" id="recommendation-3" value="not-sure"> 
          <label for="recommendation-3">Not sure</label>
        </fieldset>
        <br>
        <fieldset>
          <legend><label for="favorite-feature">What is your favorite feature of freeCodeCamp?</label></legend>
          <select id="favorite-feature" name="favorite-feature">
              <option value="">Select an option</option>
              <option value="challenges">Challenges</option>
              <option value="projects">Projects</option>
              <option value="community">Community</option>
              <option value="open-source">Open Source</option>
          </select>
        </fieldset>
        <br>
        <fieldset>
          <legend>What would you like to see improved? &#40;Check all that apply&#41;</legend>

          <input type="checkbox" name="field" id="option-1" value="front-end-projects">
          <label for="option-1">Front-end Projects</label>
          <br>
          <input type="checkbox" name="field" id="option-2" value="back-end-projects">
          <label for="option-2">Back-end Projects</label>
          <br>
          <input type="checkbox" name="field" id="option-3" value="data-visualization">
          <label for="option-3">Data Visualization</label>
          <br>
          <input type="checkbox" name="field" id="option-4" value="challenges">
          <label for="option-4">Challenges</label>
          <br>
          <input type="checkbox" name="field" id="option-5" value="open-source-community">
          <label for="option-5">Open Source Community</label>
          <br>
          <input type="checkbox" name="field" id="option-6" value="gitter-help-rooms">
          <label for="option-6">Gitter help rooms</label>
          <br>
          <input type="checkbox" name="field" id="option-7" value="videos">
          <label for="option-7">Videos</label>
          <br>
          <input type="checkbox" name="field" id="option-8" value="city-meetups">
          <label for="option-8">City Meetups</label>
          <br>
          <input type="checkbox" name="field" id="option-9" value="wiki">
          <label for="option-9">Wiki</label>
          <br>
          <input type="checkbox" name="field" id="option-10" value="forum">
          <label for="option-10">Forum</label>
          <br>
          <input type="checkbox" name="field" id="option-11" value="additional-courses">
          <label for="option-11">Additional Courses</label>
        </fieldset>
        <br>
        <fieldset>
          <legend><label for="comments">Any comments or suggestions?</label></legend>
          <textarea id="comments" name="user-comment" placeholder="Enter your comment here..." cols="19" rows="3"></textarea>
        </fieldset>
        <hr>
        <footer>
          <button type="submit" id="submit">Submit</button>
        </footer>
      </form>
    </main>
  </body>
</html>
